<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Tube feed calculator">
  <rect width="512" height="512" rx="112" fill="#1a6b5c"/>
  <!-- hang loop -->
  <circle cx="256" cy="70" r="22" fill="#ffffff"/>
  <circle cx="256" cy="70" r="9" fill="#1a6b5c"/>
  <!-- connector neck -->
  <rect x="247" y="84" width="18" height="34" fill="#ffffff"/>
  <!-- feed bag -->
  <rect x="176" y="112" width="160" height="184" rx="24" fill="#ffffff"/>
  <!-- graduation marks -->
  <g stroke="#1a6b5c" stroke-width="12" stroke-linecap="round">
    <line x1="202" y1="160" x2="240" y2="160"/>
    <line x1="202" y1="200" x2="224" y2="200"/>
    <line x1="202" y1="240" x2="240" y2="240"/>
  </g>
  <!-- outlet port -->
  <rect x="242" y="292" width="28" height="18" fill="#ffffff"/>
  <!-- drip chamber -->
  <rect x="242" y="308" width="28" height="46" rx="12" fill="#ffffff"/>
  <!-- feeding tube -->
  <path d="M256 352 C 256 414, 304 410, 300 458" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round"/>
</svg>
